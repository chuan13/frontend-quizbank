<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Part2 - 題庫管理</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <a href="../index.html" class="back-btn">← 首頁</a>
            <span>題庫管理</span>
            <span class="spacer"></span>
        </header>

        <main>
            <div class="card">
                <div class="config-group">
                    <label>篩選題庫</label>
                    <select id="record-bank-filter">
                        <option value="all">全部題庫</option>
                    </select>
                </div>
                <div class="config-group">
                    <label>排序方式</label>
                    <select id="record-sort-filter">
                        <option value="num-asc">題號 (由小到大)</option>
                        <option value="fail-desc">錯題次數 (由多到少)</option>
                    </select>
                </div>
                <div id="records-container"></div>
            </div>
        </main>

        <!-- 編輯 Modal -->
        <div class="overlay" id="overlay"></div>
        <div class="modal" id="edit-modal">
            <div class="modal-header">編輯題目</div>
            <div class="modal-body">
                <div class="config-group">
                    <label>題目文字</label>
                    <textarea id="edit-question-text" rows="3"></textarea>
                </div>
                <div class="config-group">
                    <label>選項 (勾選＝正確答案)</label>
                    <div id="edit-options-list" class="options-edit-list"></div>
                </div>
                <div class="config-group">
                    <label>說明文字 (詳解)</label>
                    <textarea id="edit-description" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" id="edit-cancel">取消</button>
                <button class="modal-btn primary" id="edit-save">儲存修改</button>
            </div>
        </div>

        <!-- 新增題目 Modal -->
        <div class="modal" id="add-modal">
            <div class="modal-header">新增題目</div>
            <div class="modal-body">
                <div class="config-group">
                    <label>目標題庫</label>
                    <select id="add-bank-select">
                        <option value="new">+ 建立新題庫</option>
                    </select>
                    <input type="text" id="add-new-bank-name" placeholder="請輸入新題庫名稱">
                </div>
                <div class="config-group">
                    <label>題目文字</label>
                    <textarea id="add-question-text" rows="3" placeholder="請輸入題目..."></textarea>
                </div>
                <div class="config-group">
                    <label>選項 (勾選＝正確答案；order 0=隨機，1+=固定順序)</label>
                    <div id="add-options-list" class="options-edit-list"></div>
                    <button type="button" class="modal-btn secondary" id="add-option-btn"
                        style="align-self: flex-start; margin-top: 6px;">+ 新增選項</button>
                </div>
                <div class="config-group">
                    <label>說明文字 (詳解，可選)</label>
                    <textarea id="add-description" rows="2" placeholder="可留空"></textarea>
                </div>
                <div class="config-group">
                    <label>
                        <input type="checkbox" id="add-keep-open" style="vertical-align: middle;">
                        儲存後繼續新增下一題
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" id="add-cancel">取消</button>
                <button class="modal-btn primary" id="add-save">儲存題目</button>
            </div>
        </div>
    </div>

    <script src="../shared/db.js"></script>
    <script src="script.js"></script>
</body>

</html>
