<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frontend Quizbank</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <span>Frontend Quizbank</span>
        </header>

        <main>
            <p class="db-status" id="db-status">資料庫載入中...</p>

            <div class="part-grid">
                <a class="part-card" href="part1-quiz/index.html">
                    <div class="part-icon">📝</div>
                    <div class="part-title">開始測驗</div>
                    <div class="part-desc">出題、答題、回饋與統計</div>
                </a>
                <a class="part-card" href="part2-bank/index.html">
                    <div class="part-icon">📚</div>
                    <div class="part-title">題庫管理</div>
                    <div class="part-desc">查看、編輯、UI 新增題目</div>
                </a>
                <a class="part-card" href="part3-import/index.html">
                    <div class="part-icon">📥</div>
                    <div class="part-title">JSON 匯入</div>
                    <div class="part-desc">檔案或貼上文字批次匯入</div>
                </a>
                <a class="part-card" href="part4-home/index.html">
                    <div class="part-icon">⚙️</div>
                    <div class="part-title">狀態與維護</div>
                    <div class="part-desc">資料庫狀態、清空紀錄</div>
                </a>
            </div>

            <p class="hint">四個 part 由不同組員開發，共用 <code>shared/db.js</code> 操作同一個 IndexedDB（QuizDB）。</p>
        </main>
    </div>

    <script src="shared/db.js"></script>
    <script>
        (async () => {
            await QuizDB.init();
            const all = await QuizDB.getAll();
            const banks = [...new Set(all.map(q => q.questionBank))];
            const el = document.getElementById('db-status');
            if (all.length === 0) {
                el.textContent = '目前資料庫為空，可從「JSON 匯入」開始。';
            } else {
                el.innerHTML = `目前共 <b>${all.length}</b> 題，分布於 <b>${banks.length}</b> 個題庫。`;
            }
        })();
    </script>
</body>

</html>
