<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Part4 - 狀態與維護</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <a href="../index.html" class="back-btn">← 首頁</a>
            <span>狀態與維護</span>
            <span class="spacer"></span>
        </header>

        <main>
            <div class="card">
                <h2>📊 資料庫狀態</h2>
                <div class="stat-row"><span>總題數</span><b id="stat-total">-</b></div>
                <div class="stat-row"><span>題庫數</span><b id="stat-banks">-</b></div>
                <div class="stat-row"><span>累計答對</span><b id="stat-correct">-</b></div>
                <div class="stat-row"><span>累計答錯</span><b id="stat-fail">-</b></div>

                <h3 style="margin-top:18px;">各題庫題數</h3>
                <ul id="bank-list" class="bank-list"></ul>
            </div>

            <div class="card">
                <h2>🧹 資料維護</h2>
                <button class="danger-btn" id="btn-reset-fails">清空所有錯題紀錄</button>
                <p class="hint-text">將每題的 fail 計數歸零，題目不會被刪除。</p>

                <button class="danger-btn danger-strong" id="btn-clear-all">⚠️ 清空所有題庫與紀錄</button>
                <p class="hint-text">永久刪除整個 IndexedDB 資料，無法復原。</p>
            </div>
        </main>
    </div>

    <script src="../shared/db.js"></script>
    <script src="script.js"></script>
</body>

</html>
